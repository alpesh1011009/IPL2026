<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#f3f4f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ballGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="520" height="160" rx="16" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Orange glow blob behind ball -->
  <ellipse cx="72" cy="80" rx="55" ry="55" fill="#f97316" opacity="0.08"/>

  <!-- Cricket Ball -->
  <circle cx="72" cy="80" r="38" fill="url(#ballGrad)" filter="url(#ballGlow)"/>
  <!-- Ball seam - horizontal -->
  <path d="M 34 80 Q 52 70 72 80 Q 92 90 110 80" fill="none" stroke="#7c2d12" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Ball seam - curve top -->
  <path d="M 50 50 Q 72 62 94 50" fill="none" stroke="#7c2d12" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Ball seam - curve bottom -->
  <path d="M 50 110 Q 72 98 94 110" fill="none" stroke="#7c2d12" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Ball highlight -->
  <circle cx="58" cy="65" r="6" fill="white" opacity="0.18"/>

  <!-- "CricPost" text -->
  <text x="128" y="97" font-family="'Arial Black', 'Impact', sans-serif" font-size="56" font-weight="900" letter-spacing="-1" fill="url(#textGrad)" filter="url(#glow)">CricPost</text>

  <!-- ".in" in orange -->
  <text x="392" y="97" font-family="'Arial Black', 'Impact', sans-serif" font-size="56" font-weight="900" fill="#f97316">.in</text>

  <!-- Tagline -->
  <text x="128" y="122" font-family="'Arial', sans-serif" font-size="16" letter-spacing="3" fill="#71717a" font-weight="400">CRICKET POSTERS &amp; MEMES</text>

  <!-- Accent line under logo text -->
  <rect x="128" y="108" width="300" height="2" rx="1" fill="#f97316" opacity="0.4"/>
</svg>
